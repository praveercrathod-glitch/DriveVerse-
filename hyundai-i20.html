<!DOCTYPE html>
<html>
<head>
  <title>Hyundai i20</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { color: cyan; }

    .btn {
      display: block;
      width: 70%;
      margin: 20px auto;
      padding: 15px;
      background: cyan;
      border-radius: 15px;
      color: black;
      border: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Hyundai i20</h1>

  <button class="btn" onclick="start()">Start Engine 🔊</button>
  <button class="btn" onclick="rev()">Rev Engine 🔥</button>

  <br>
  <a class="btn" href="/DriveVerse-/hyundai.html">⬅ Back</a>

  <audio id="startSound" src="engine2.mp3"></audio>
  <audio id="revSound" src="revv2.mp3"></audio>

  <script>
    function start() {
      document.getElementById("startSound").play();
    }

    function rev() {
      document.getElementById("revSound").play();
    }
  </script>

</body>
</html>
