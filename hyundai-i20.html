<!DOCTYPE html>
<html>
<head>
  <title>Hyundai i20 - DriveVerse</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1c1c1c);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      background: linear-gradient(to right, cyan, white);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      width: 300px;
      margin: auto;
      padding: 20px;
      box-shadow: 0 0 25px cyan;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px cyan; }
      50% { box-shadow: 0 0 25px blue; }
      100% { box-shadow: 0 0 10px cyan; }
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, cyan, blue);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .back {
      margin-top: 20px;
    }

  </style>
</head>

<body>

<h1>DriveVerse</h1>
<h2>Hyundai i20</h2>

<div class="card">

  <!-- IMAGE -->
  <img src="car2.jpg">

  <!-- ENGINE BUTTON -->
  <button onclick="playSound()">Start Engine 🔊</button>

  <!-- AUDIO -->
  <audio id="engine">
    <source src="engine2.mp3" type="audio/mpeg">
  </audio>
<button onclick="revSound()">Rev Engine 💨</button>

<audio id="rev">
  <source src="revv2.mp3" type="audio/mpeg">
</audio>

<script>
function revSound() {
  let r = document.getElementById("rev");
  r.currentTime = 0;
  r.play();
}
</script>
  <!-- SCRIPT -->
  <script>
    function playSound() {
      let sound = document.getElementById("engine");
      sound.currentTime = 0;
      sound.play();
    }
  </script>

  <!-- DETAILS -->
  <p>🚗 Mileage: 20 km/l</p>
  <p>⛽ Fuel: Petrol</p>
  <p>💰 Price: ₹7L - ₹11L</p>

  <!-- PRICE BUTTON -->
  <a href="https://www.cardekho.com">
    <button>Check Price 💰</button>
  </a>

</div>

<div class="back">
  <a href="index.html">
    <button>⬅ Back</button>
  </a>
</div>

</body>
</html
