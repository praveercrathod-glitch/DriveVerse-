<!DOCTYPE html>
<html>
<head>
  <title>Hyundai i20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      width: 320px;
      margin: auto;
      padding: 20px;
      box-shadow: 0 0 25px cyan;
      overflow: hidden; /* 🔥 FIX */
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: cyan;
      color: black;
      font-weight: bold;
      font-size: 15px;
    }

    .wave-container {
      width: 100%;
      height: 6px;
      overflow: hidden;
      margin: 12px 0;
    }

    .wave {
      height: 100%;
      background: cyan;
      animation: wave 1s infinite;
    }

    @keyframes wave {
      0% { transform: scaleX(0.5); }
      50% { transform: scaleX(1.2); }
      100% { transform: scaleX(0.5); }
    }
  </style>
</head>

<body>

<h2>Hyundai i20</h2>

<div class="card">

  <img src="car2.jpg">

  <button onclick="playSound()">Start Engine 🔊</button>
  <button onclick="revSound()">Rev Engine 💨</button>

  <div class="wave-container">
    <div class="wave"></div>
  </div>

  <p>🚗 Mileage: 20 km/l</p>
  <p>⛽ Fuel: Petrol</p>
  <p>💰 Price: ₹7L - ₹11L</p>

  <a href="https://www.cardekho.com/hyundai/i20">
    <button>Check Price 💰</button>
  </a>

</div>

<br>

<a href="index.html">
  <button style="background:#222;">⬅ Back</button>
</a>

<audio id="engine">
  <source src="engine2.mp3" type="audio/mpeg">
</audio>

<audio id="rev">
  <source src="revv2.mp3" type="audio/mpeg">
</audio>

<script>
function playSound() {
  let s = document.getElementById("engine");
  s.currentTime = 0;
  s.play();
}

function revSound() {
  let r = document.getElementById("rev");
  r.currentTime = 0;
  r.play();
}
</script>

</body>
</html>
