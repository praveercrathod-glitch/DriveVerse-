<!DOCTYPE html>
<html>
<head>
  <title>Hyundai i20 - DriveVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      width: 300px;
      margin: auto;
      padding: 20px;
      box-shadow: 0 0 20px cyan;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: cyan;
      color: black;
      font-weight: bold;
    }

    .wave {
      margin-top: 10px;
      height: 5px;
      background: cyan;
      animation: wave 1s infinite;
    }

    @keyframes wave {
      0% { transform: scaleX(0.5); }
      50% { transform: scaleX(1.2); }
      100% { transform: scaleX(0.5); }
    }
  </style>
</head>

<body>

<h2>Hyundai i20</h2>

<div class="card">

  <!-- IMAGE -->
  <img src="car2.jpg">

  <!-- BUTTONS -->
  <button onclick="playSound()">Start Engine 🔊</button>
  <button onclick="revSound()">Rev Engine 💨</button>

  <!-- WAVE -->
  <div class="wave"></div>

  <!-- AUDIO -->
  <audio id="engine">
    <source src="engine2.mp3" type="audio/mpeg">
  </audio>

  <audio id="rev">
    <source src="rev.mp3" type="audio/mpeg">
  </audio>

  <!-- SCRIPT -->
  <script>
    function playSound() {
      let s = document.getElementById("engine");
      s.currentTime = 0;
      s.play();
    }

    function revSound() {
      let r = document.getElementById("rev");
      r.currentTime = 0;
      r.play();
    }
  </script>

  <!-- DETAILS -->
  <p>🚗 Mileage: 20 km/l</p>
  <p>⛽ Fuel: Petrol</p>
  <p>💰 Price: ₹7L - ₹11L</p>

  <!-- CARDEKHO LINK -->
  <a href="https://www.cardekho.com/hyundai/i20">
    <button>Check Price 💰</button>
  </a>

</div>

<br>

<a href="index.html">
  <button>⬅ Back</button>
</a>

</body>
</html>
