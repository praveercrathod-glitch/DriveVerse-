<!DOCTYPE html>
<html>
<head>
  <title>DriveVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
      background: linear-gradient(to right, white, red);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      max-width: 300px;
      margin: auto;
    }

    .car-btn {
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.08);
      color: white;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>DriveVerse</h1>
<p>Step Into Your Next Car</p>

<div class="container">

  <a href="tata-nexon.html">
    <button class="car-btn">🚗 Tata Nexon</button>
  </a>

  <a href="hyundai-i20.html">
    <button class="car-btn">🚗 Hyundai i20</button>
  </a>

</div>

</html>

</html>
