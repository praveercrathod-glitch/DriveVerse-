<!DOCTYPE html>
<html>
<head>
  <title>DriveVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🔥 PREMIUM GRADIENT BACKGROUND */
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      background: linear-gradient(to right, #ff4b2b, #ff416c);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    /* 💎 GLASS CARDS */
    .card {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,0,0,0.6);
    }

    .card.hyundai {
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    .card.hyundai:hover {
      box-shadow: 0 0 30px rgba(0,255,255,0.6);
    }

    a {
      text-decoration: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>DriveVerse</h1>
  <p>Step Into Your Next Car</p>

  <a href="tata.html">
    <div class="card">
      🚗 Tata
    </div>
  </a>

  <a href="hyundai.html">
    <div class="card hyundai">
      🚗 Hyundai
    </div>
  </a>

</div>

</body>
</html>
