<!DOCTYPE html>
<html>
<head>
  <title>DriveVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
      background: linear-gradient(to right, #ff4b2b, #ff416c);
      -webkit-background-clip: text;
      color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 30px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      transition: 0.3s;
      font-weight: bold;
      font-size: 18px;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<h1>DriveVerse 🚗</h1>
<p>Select Your Brand</p>

<div class="grid">
  <a href="tata.html"><div class="card">Tata</div></a>
  <a href="hyundai.html"><div class="card">Hyundai</div></a>
</div>

</body>
</html>
