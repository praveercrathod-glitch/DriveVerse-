<!DOCTYPE html>
<html>
<head>
  <title>DriveVerse</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 42px;
      background: linear-gradient(to right, white, red);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      color: #ccc;
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      width: 230px;
      padding: 15px;
      box-shadow: 0 0 25px rgba(255,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px red;
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, red, orange);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

<h1>DriveVerse</h1>
<p class="tagline">Step Into Your Next Car</p>

<h2>Featured Cars</h2>

<div class="container">

  <div class="card">
    <h3>Tata Nexon</h3>
    <h3>Hundai i20</h3>
    <a href="tata-nexon.html">
      <button>Experience 🚗</button>
    <a href="hyundai-i20.html">
      <button>Experience 🚗</button>
    </a>
  </div>

</div>

</body>
</html>
