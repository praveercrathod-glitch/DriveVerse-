<!DOCTYPE html>
<html>
<head>
  <title>DriveVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 38px;
      background: linear-gradient(to right, #ff4b2b, #ff416c);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      transition: 0.3s;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<h1>DriveVerse 🚗</h1>
<p>Select Your Brand</p>

<div class="grid">

  <a href="tata.html"><div class="card">Tata</div></a>
  <a href="hyundai.html"><div class="card">Hyundai</div></a>
  <a href="maruti.html"><div class="card">Maruti Suzuki</div></a>
  <a href="mahindra.html"><div class="card">Mahindra</div></a>
  <a href="kia.html"><div class="card">Kia</div></a>
  <a href="toyota.html"><div class="card">Toyota</div></a>
  <a href="bmw.html"><div class="card">BMW</div></a>
  <a href="audi.html"><div class="card">Audi</div></a>
  <a href="mercedes.html"><div class="card">Mercedes</div></a>
  <a href="volvo.html"><div class="card">Volvo</div></a>
  <a href="mg.html"><div class="card">MG</div></a>
  <a href="byd.html"><div class="card">BYD</div></a>

</div>

</body>
</html>
