<!DOCTYPE html>
<html>
<head>
  <title>Tata Nexon - DriveVerse</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1c1c1c);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: red;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      width: 300px;
      margin: auto;
      padding: 20px;
      box-shadow: 0 0 25px red;
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, red, orange);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .back {
      margin-top: 20px;
    }

  </style>
</head>

<body>

<h1>DriveVerse</h1>
<h2>Tata Nexon</h2>

<div class="card">

  <img src="car.jpg">

  <button onclick="playSound()">Start Engine 🔊</button>

  <audio id="engine">
    <source src="engine.mp3" type="audio/mpeg">
  </audio>

  <script>
    function playSound() {
      document.getElementById("engine").play();
    }
  </script>

  <p>🚗 Mileage: 17 km/l</p>
  <p>⛽ Fuel: Petrol / Diesel</p>
  <p>💰 Price: ₹8L - ₹15L</p>

</div>

<div class="back">
  <a href="index.html">
    <button>⬅ Back</button>
  </a>
</div>

</body>
</html>
