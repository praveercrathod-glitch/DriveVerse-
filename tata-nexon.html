<!DOCTYPE html>
<html>
<head>
  <title>Tata Nexon - DriveVerse</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1 style="color:red;">Tata Nexon</h1>
<p>Step Into the Experience</p>

<!-- CAR IMAGE -->
<img src="car.jpg" width="300" style="border-radius:10px;">

<br><br>

<!-- ENGINE SOUND BUTTON -->
<button onclick="playSound()" 
style="padding:12px; background:red; color:white; border:none; border-radius:5px;">
Start Engine 🔊
</button>

<!-- AUDIO FILE -->
<audio id="engine">
  <source src="engine.mp3" type="audio/mpeg">
</audio>

<!-- SCRIPT -->
<script>
function playSound() {
  var sound = document.getElementById("engine");
  sound.currentTime = 0;
  sound.play();
}
</script>

<br><br>

<!-- CAR DETAILS -->
<p>✔ Mileage: 17 km/l</p>
<p>✔ Fuel: Petrol / Diesel</p>
<p>✔ Price: ₹8L - ₹15L</p>
