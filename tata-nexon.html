<!DOCTYPE html>
<html>
<head>
  <title>Tata Nexon</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      color: red;
      margin-top: 30px;
    }

    img {
      width: 85%;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px red;
    }

    .btn {
      display: block;
      width: 70%;
      margin: 20px auto;
      padding: 15px;
      background: red;
      border-radius: 15px;
      color: white;
      border: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Tata Nexon 🚗</h1>

  <!-- IMAGE HERE -->
  <img src="car.jpg">

  <button class="btn" onclick="start()">Start Engine 🔊</button>
  <button class="btn" onclick="rev()">Rev Engine 🔥</button>

  <a class="btn" href="tata.html">⬅ Back</a>

  <audio id="startSound" src="engine.mp3"></audio>
  <audio id="revSound" src="revv1.mp3"></audio>

  <script>
    function start() {
      document.getElementById("startSound").play();
    }

    function rev() {
      document.getElementById("revSound").play();
    }
  </script>

</body>
</html>
