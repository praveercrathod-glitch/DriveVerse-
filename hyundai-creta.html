<!DOCTYPE html>
<html>
<head>
  <title>Car Name</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      animation: fadeIn 1s ease-in;
    }

    h1 {
      color: red;
      margin-top: 30px;
    }

    .car-img {
      width: 85%;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 25px red;
      animation: zoomIn 1s ease;
    }

    .btn {
      display: block;
      width: 70%;
      margin: 20px auto;
      padding: 15px;
      background: red;
      border-radius: 15px;
      color: white;
      border: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes zoomIn {
      from {transform: scale(0.8);}
      to {transform: scale(1);}
    }
  </style>
</head>

<body>

<h1>Car Name 🚗</h1>

<img src="car.jpg" class="car-img">

<button class="btn">Start Engine 🔊</button>
<button class="btn">Rev Engine 🔥</button>

<a class="btn" href="index.html">⬅ Back</a>

</body>
</html>
